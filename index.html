<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f1218;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            background: linear-gradient(145deg, #1a1f29, #12151c);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid #2a303c;
        }
        .balance-card {
            background: #161b22;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 10px;
        }
        .balance-value {
            color: #4c8bf5;
            font-size: 24px;
            font-weight: bold;
        }
        .sections-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .card {
            background: #1c212b;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #2a303c;
        }
        .card i { font-size: 30px; margin-bottom: 10px; display: block; }
        .coming-soon { color: #8a6d3b; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Welcome <span id="username">Guest</span>! 👋</h2>
        <p>A premium hub for digital shopping</p>
        <div class="balance-card">
            Balance: <span class="balance-value">0 ⭐ / $0.00</span>
        </div>
    </div>

    <h3>Sections</h3>
    <div class="sections-grid">
        <div class="card">
            🎁<br>Gifts Section<br>
            <span class="coming-soon">Coming Soon</span>
        </div>
        <div class="card">
            🎮<br>Games Section
        </div>
        <div class="card">
            🛡️<br>Mediation
        </div>
        <div class="card">
            📞<br>Numbers
        </div>
    </div>

    <script>
        // ربط الواجهة مع بيانات تيليجرام الحقيقية
        const tg = window.Telegram.WebApp;
        tg.expand(); // يخلي التطبيق يفتح كامل الشاشة
        if (tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }
    </script>
</body>
</html>
