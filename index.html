<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b0e14; --card-bg: #161b26; --accent: #4c8bf5; --text: #ffffff; --gray: #8e8e93;
            --purple-grad: linear-gradient(180deg, #1a0a2e 0%, #4a148c 100%);
        }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Loader */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--purple-grad); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: 0.5s; }
        .spinner { width: 45px; height: 45px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Pages Control */
        .page { display: none; padding-bottom: 30px; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Shared Components */
        .top-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.2); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .welcome-card { background: linear-gradient(180deg, #1a1f2e 0%, #0b0e14 100%); margin: 15px; padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .balance-box { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.05); display: inline-block; }
        
        /* Grid Layout */
        .sections-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .s-card { background: var(--card-bg); border-radius: 20px; padding: 20px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .icon-box { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 22px; color: white; }
        
        /* Settings Styles */
        .setting-item { background: var(--card-bg); border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; gap: 12px; margin: 0 15px 10px; border: 1px solid rgba(255,255,255,0.03); }
        .setting-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .logout-btn { background: #a94442; color: white; margin: 20px 15px; padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; }

        /* Colors */
        .bg-orange { background: #f39c12; } .bg-purple { background: #9b59b6; } .bg-teal { background: #16a085; }
        .bg-gold { background: #d4af37; } .bg-blue { background: #2980b9; } .bg-red { background: #e74c3c; }
        .grad-green { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .grad-blue { background: linear-gradient(135deg, #3498db, #2980b9); }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div id="home-page" class="page active">
        <div class="top-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="" class="user-photo user-avatar">
                <div><h3 class="user-full-name" style="margin:0; font-size:15px; color:var(--accent);">User</h3><p style="margin:0; font-size:11px; color:var(--gray);">Star Market</p></div>
            </div>
            <i class="fa-solid fa-gear" onclick="showPage('settings-page')" style="color: var(--gray); font-size: 20px;"></i>
        </div>

        <div class="welcome-card">
            <h1 style="margin:0">Welcome <span class="first-name">User</span>! 👋</h1>
            <p style="color:var(--gray); font-size:12px;">A premium hub for digital shopping & services.</p>
            <div class="balance-box"><p style="margin:0; font-size:11px; color:var(--gray);">Balance</p><span>0 ⭐ / $0.00</span></div>
        </div>

        <p style="padding:0 20px; font-weight:bold;">Sections</p>
        <div class="sections-grid">
            <div class="s-card"><div class="icon-box bg-orange"><i class="fa-solid fa-shop"></i></div><span>General Services</span></div>
            <div class="s-card"><div class="icon-box bg-purple"><i class="fa-solid fa-chart-line"></i></div><span>SMM Section</span></div>
            <div class="s-card"><div class="icon-box bg-teal"><i class="fa-solid fa-wallet"></i></div><span>Recharge & Payment</span></div>
            <div class="s-card"><div class="icon-box bg-gold"><i class="fa-solid fa-dollar-sign"></i></div><span>Money Transfers</span></div>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="top-header">
            <i class="fa-solid fa-arrow-right" onclick="showPage('home-page')"></i>
            <h3 style="flex:1; text-align:center; margin-right:30px;">Settings</h3>
        </div>

        <div class="welcome-card" style="display:flex; align-items:center; gap:15px; padding:15px;">
            <img src="" class="user-photo user-avatar" style="width:50px; height:50px;">
            <div><h4 class="user-full-name" style="margin:0">User Name</h4><p style="margin:0; font-size:12px; color:var(--gray);">Customer Profile</p></div>
        </div>

        <div class="setting-item">
            <div class="setting-icon bg-purple"><i class="fa-solid fa-moon"></i></div>
            <div style="flex:1"><h4>Appearance</h4><p>Toggle Dark/Light Mode</p></div>
            <i class="fa-solid fa-chevron-left" style="font-size:12px; color:var(--gray);"></i>
        </div>
        
        <div class="setting-item">
            <div class="setting-icon bg-teal"><i class="fa-solid fa-wallet"></i></div>
            <div style="flex:1"><h4>Top Up</h4><p>Add balance</p></div>
            <i class="fa-solid fa-chevron-left" style="font-size:12px; color:var(--gray);"></i>
        </div>

        <div class="logout-btn" onclick="tg.close()">Logout</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        window.onload = () => {
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; 
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500); }, 1000);
        };

        const user = tg.initDataUnsafe.user;
        if (user) {
            document.querySelectorAll('.user-full-name').forEach(el => el.innerText = user.first_name + " " + (user.last_name || ""));
            document.querySelectorAll('.first-name').forEach(el => el.innerText = user.first_name);
            const photo = user.photo_url || "https://ui-avatars.com/api/?name=" + user.first_name;
            document.querySelectorAll('.user-photo').forEach(el => el.src = photo);
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            tg.BackButton[id === 'home-page' ? 'hide' : 'show']();
        }

        tg.BackButton.onClick(() => showPage('home-page'));
    </script>
</body>
</html>
