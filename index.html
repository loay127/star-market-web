<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f1218; --card: #1c212b; --accent: #4c8bf5; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .page { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { background: linear-gradient(145deg, #1a1f29, #12151c); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #2a303c; margin-bottom: 20px; }
        .balance-card { background: #161b22; padding: 10px 20px; border-radius: 15px; display: inline-block; margin-top: 10px; border: 1px solid #333; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card); padding: 20px; border-radius: 18px; text-align: center; border: 1px solid #2a303c; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.95); background: #252b38; }
        .card i { font-size: 32px; display: block; margin-bottom: 10px; }
        .card span { font-size: 14px; font-weight: 500; }

        .btn-action { padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; cursor: pointer; color: white; text-decoration: none; display: block; }
        .recharge { background: #4caf50; }
        .orders { background: #2196f3; }
        .back-btn { background: #333; color: white; padding: 8px 15px; border-radius: 10px; border: none; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="header">
            <h3>مرحباً بك <span id="username">User</span>! 👋</h3>
            <div class="balance-card">رصيدك: <span style="color: #4c8bf5; font-weight: bold;">0 ⭐ / $0.00</span></div>
        </div>

        <h4 style="margin: 20px 5px 10px;">الأقسام</h4>
        <div class="grid">
            <div class="card" onclick="showPage('games-page')"><i>🎮</i><span>قسم الألعاب</span></div>
            <div class="card" onclick="showPage('smm-page')"><i>📈</i><span>قسم SMM</span></div>
            <div class="card"><i>📞</i><span>قسم الأرقام</span></div>
            <div class="card"><i>📱</i><span>eSIM</span></div>
        </div>

        <h4 style="margin: 25px 5px 10px;">إجراءات سريعة</h4>
        <div class="grid">
            <div class="btn-action recharge" onclick="alert('قريباً...')">شحن الرصيد 💳</div>
            <div class="btn-action orders" onclick="alert('قريباً...')">طلباتي 📦</div>
        </div>
    </div>

    <div id="games-page" class="page">
        <button class="back-btn" onclick="showPage('home-page')">⬅️ العودة</button>
        <h2>🎮 متجر الألعاب</h2>
        <div class="grid">
            <div class="card">🔥<br>ببجي موبايل</div>
            <div class="card">💎<br>فري فاير</div>
        </div>
    </div>

    <div id="smm-page" class="page">
        <button class="back-btn" onclick="showPage('home-page')">⬅️ العودة</button>
        <h2>📈 خدمات SMM</h2>
        <p style="text-align: center;">خدمات تيك توك وإنستغرام قريباً...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
