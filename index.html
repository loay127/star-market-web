<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0f1218; 
            --card: #1c212b; 
            --accent: #4c8bf5; 
            --text: #ffffff; 
            --success: #31b545;
        }
        
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; 
        }

        /* 1. شاشة التحميل (Loader) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; justify-content: center;
            align-items: center; z-index: 9999; transition: 0.5s;
        }
        .loader-content { text-align: center; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(76, 139, 245, 0.1);
            border-top: 4px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 2. تنسيق الصفحات */
        .page { display: none; padding: 15px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { 
            background: linear-gradient(145deg, #1a1f29, #12151c); 
            padding: 25px 20px; border-radius: 0 0 30px 30px; 
            text-align: center; border-bottom: 1px solid #2a303c; margin-bottom: 20px; 
        }
        .balance-card { 
            background: rgba(76, 139, 245, 0.1); padding: 8px 20px; 
            border-radius: 15px; border: 1px solid var(--accent); margin-top: 12px; display: inline-block;
        }

        /* 3. السلايدر */
        .slider-container {
            width: 100%; height: 160px; border-radius: 20px; 
            overflow: hidden; margin-bottom: 20px; border: 1px solid #2a303c;
        }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* 4. الكروت والأقسام */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { 
            background: var(--card); border-radius: 20px; overflow: hidden; 
            border: 1px solid #2a303c; transition: 0.3s;
        }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; font-weight: bold; font-size: 14px; }
        .card:active { transform: scale(0.95); }

        /* 5. كروت المنتجات */
        .product-card {
            background: #161b22; border-radius: 18px; padding: 15px;
            border: 1px solid #2a303c; text-align: center;
        }
        .product-card img { width: 70px; height: 70px; border-radius: 12px; margin-bottom: 10px; }
        .price { color: var(--success); font-weight: bold; display: block; margin-bottom: 10px; }
        .buy-btn { 
            background: var(--accent); border: none; color: white; 
            padding: 10px; border-radius: 12px; width: 100%; font-weight: bold; 
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <p>جاري تحميل Star Market...</p>
        </div>
    </div>

    <div id="home-page" class="page active">
        <div class="header">
            <h3 style="margin:0">مرحباً <span id="username" style="color: var(--accent);">User</span>! 👋</h3>
            <div class="balance-card">رصيدك: <span style="font-weight: bold;">0.00 دج</span></div>
        </div>

        <div class="slider-container">
            <div class="slide">
                <img src="https://img.freepik.com/free-vector/flat-sale-banner-with-photo-template_23-2149026954.jpg">
            </div>
        </div>

        <h4 style="margin: 0 5px 15px;">الأقسام الرئيسية 📦</h4>
        <div class="grid">
            <div class="card" onclick="showPage('games-page')">
                <img src="https://img.freepik.com/free-vector/joystick-game-controller-concept_23-2148533276.jpg">
                <div class="card-info">شحن الألعاب</div>
            </div>
            <div class="card" onclick="showPage('smm-page')">
                <img src="https://img.freepik.com/free-vector/social-media-concept-with-icons_23-2148419614.jpg">
                <div class="card-info">خدمات SMM</div>
            </div>
        </div>
    </div>

    <div id="games-page" class="page">
        <h2 style="text-align: center; margin-bottom: 20px;">🎮 متجر الألعاب</h2>
        <div class="grid">
            <div class="product-card">
                <img src="https://logowik.com/content/uploads/images/pubg-mobile5642.jpg">
                <h4>PUBG UC</h4>
                <span class="price">180 دج</span>
                <button class="buy-btn" onclick="order('PUBG 60 UC')">شراء</button>
            </div>
            <div class="product-card">
                <img src="https://logos-world.net/wp-content/uploads/2022/02/Free-Fire-Logo.png">
                <h4>Free Fire</h4>
                <span class="price">150 دج</span>
                <button class="buy-btn" onclick="order('FF 100 Gems')">شراء</button>
            </div>
        </div>
    </div>

    <div id="smm-page" class="page">
        <h2 style="text-align: center;">📈 خدمات SMM</h2>
        <p style="text-align: center; color: #888; margin-top: 50px;">قريباً... خدمات تيك توك وإنستغرام</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // إخبار تيليجرام أن التطبيق جاهز
        tg.expand(); // توسيع التطبيق ليأخذ الشاشة كاملة

        // إخفاء الـ Loader بعد ثانية
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1000);
        };

        // تعيين اسم المستخدم
        if (tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        // التنقل بين الصفحات
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);

            if (pageId === 'home-page') {
                tg.BackButton.hide();
            } else {
                tg.BackButton.show();
            }
        }

        // زر الرجوع تاع تيليجرام
        tg.BackButton.onClick(() => {
            showPage('home-page');
        });

        // تنفيذ الطلب
        function order(name) {
            tg.showConfirm(`هل أنت متأكد من شراء ${name}؟`, (ok) => {
                if(ok) {
                    tg.showAlert("شكراً لطلبك! سيتم التواصل معك.");
                    // هنا تقدر تبعت البيانات للسيرفر تاعك
                }
            });
        }
    </script>
</body>
</html>
