<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0f1218; 
            --card: #1c212b; 
            --accent: #4c8bf5; 
            --text: #ffffff; 
            --success: #31b545;
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }

        /* تحسين الصفحات */
        .page { display: none; padding: 15px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ستايل السلايدر (الإعلانات) */
        .slider-container {
            width: 100%;
            height: 150px;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 20px;
            position: relative;
        }
        .slider { display: flex; transition: 0.5s; height: 100%; }
        .slide { min-width: 100%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .header { background: linear-gradient(145deg, #1a1f29, #12151c); padding: 20px; border-radius: 0 0 25px 25px; text-align: center; border-bottom: 1px solid #2a303c; margin-bottom: 20px; }
        .balance-card { background: rgba(76, 139, 245, 0.1); padding: 8px 15px; border-radius: 12px; display: inline-block; border: 1px solid var(--accent); margin-top: 10px; }
        
        /* كروت الأقسام */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { 
            background: var(--card); 
            border-radius: 18px; 
            overflow: hidden; 
            border: 1px solid #2a303c; 
            transition: 0.3s;
            position: relative;
        }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; }
        .card:active { transform: scale(0.96); }

        /* كروت المنتجات (فخمة) */
        .product-card {
            background: #161b22;
            border-radius: 15px;
            padding: 10px;
            border: 1px solid #2a303c;
            text-align: center;
        }
        .product-card img { width: 80px; height: 80px; border-radius: 12px; margin-bottom: 10px; }
        .price { color: var(--success); font-weight: bold; display: block; margin: 5px 0; }
        .buy-btn { background: var(--accent); border: none; color: white; padding: 7px 15px; border-radius: 8px; width: 100%; cursor: pointer; }

        .section-title { margin: 20px 5px 10px; font-size: 18px; display: flex; align-items: center; justify-content: space-between; }
        
        .btn-action { padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; cursor: pointer; color: white; }
        .recharge { background: #4caf50; }
        .orders { background: #2196f3; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="header">
            <h3>مرحباً بك <span id="username" style="color: var(--accent);">لؤي</span>! 👋</h3>
            <div class="balance-card">رصيدك: <span id="balance">0 ⭐ / $0.00</span></div>
        </div>

        <div class="slider-container">
            <div class="slider" id="slider">
                <div class="slide"><img src="https://img.freepik.com/free-vector/gaming-banner-template-with-action-elements_23-2148737672.jpg" alt="Ads 1"></div>
                </div>
        </div>

        <h4 class="section-title">الأقسام الرئيسية 📦</h4>
        <div class="grid">
            <div class="card" onclick="showPage('games-page')">
                <img src="https://img.freepik.com/free-vector/modern-gaming-background-with-stylish-design_1017-30275.jpg">
                <div class="card-info"><span>شحن الألعاب</span></div>
            </div>
            <div class="card" onclick="showPage('smm-page')">
                <img src="https://img.freepik.com/free-photo/social-media-marketing-concept-marketing-with-applications_23-2150063134.jpg">
                <div class="card-info"><span>خدمات SMM</span></div>
            </div>
        </div>

        <h4 class="section-title">إجراءات سريعة ⚡</h4>
        <div class="grid" style="margin-bottom: 20px;">
            <div class="btn-action recharge" onclick="tg.showAlert('قريباً سيتم تفعيل الدفع عبر بريدي موب!')">شحن الرصيد 💳</div>
            <div class="btn-action orders" onclick="tg.showAlert('لا توجد طلبات حالياً')">طلباتي 📦</div>
        </div>
    </div>

    <div id="games-page" class="page">
        <h2 style="text-align: center;">🎮 متجر الألعاب</h2>
        <div class="grid">
            <div class="product-card">
                <img src="https://static.vecteezy.com/system/resources/previews/022/636/388/original/pubg-mobile-logo-free-vector.jpg">
                <h4>PUBG Mobile</h4>
                <span class="price">60 UC - 180 DA</span>
                <button class="buy-btn" onclick="order('PUBG 60 UC')">شراء</button>
            </div>
            <div class="product-card">
                <img src="https://logos-world.net/wp-content/uploads/2022/02/Free-Fire-Logo.png">
                <h4>Free Fire</h4>
                <span class="price">100 💎 - 150 DA</span>
                <button class="buy-btn" onclick="order('Free Fire 100 Gems')">شراء</button>
            </div>
        </div>
    </div>

    <div id="smm-page" class="page">
        <h2 style="text-align: center;">📈 خدمات SMM</h2>
        <p style="text-align: center; color: #888;">سيتم إضافة الخدمات قريباً...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // جلب اسم المستخدم وتعيينه
        if (tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        // وظيفة تغيير الصفحات
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);

            // تفعيل زر الرجوع الأصلي تاع تيليجرام
            if (pageId === 'home-page') {
                tg.BackButton.hide();
            } else {
                tg.BackButton.show();
            }
        }

        // عند الضغط على زر الرجوع في تيليجرام
        tg.BackButton.onClick(() => {
            showPage('home-page');
        });

        // وظيفة الطلب
        function order(itemName) {
            tg.showConfirm(`هل تريد تأكيد طلب: ${itemName}؟`, (confirm) => {
                if(confirm) {
                    tg.sendData("Order: " + itemName);
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
